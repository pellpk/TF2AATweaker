# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.0.2

      - name: Restore NuGet packages
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: nuget restore ${{env.SOLUTION_FILE_PATH}}

      - name: Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        # Add additional options to the MSBuild command line here (like platform or verbosity level).
        # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
        run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}

      - name: Prepare Staging Folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging -Force

          Copy-Item -Path mod -Destination staging/mod -Recurse
          Copy-Item -Path manifest.json -Destination staging/

          New-Item -ItemType Directory -Path staging/mod/paks -Force
          Copy-Item -Path x64/Release/*.dll -Destination staging/mod/paks/

          if ("${{ github.ref_type }}" -eq "tag") {
            $modJson = Get-Content staging/mod/mod.json | ConvertFrom-Json
            $modJson.Version = "${{ github.ref_name }}"
            $modJson | ConvertTo-Json -Depth 10 | Set-Content staging/mod/mod.json
          }

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: staging/
